services:
  # ── Development ─────────────────────────────────────────────────────────────
  game-dev:
    build:
      context: .
      dockerfile: docker/dev/Dockerfile
    container_name: deathmatch-dev
    ports:
      - "3000:3000"
    volumes:
      # Mount Go source for live editing (restart container to recompile)
      - ./backend-go:/workspace/backend-go
      # Mount frontend for instant edits without rebuild
      - ./frontend:/workspace/frontend
    environment:
      - PORT=3000
    restart: unless-stopped
    profiles:
      - dev

  # ── Production (local build) ─────────────────────────────────────────────────
  game-prod:
    build:
      context: .
      dockerfile: docker/prod/Dockerfile
    container_name: deathmatch-prod
    ports:
      - "3000:3000"
    volumes:
      - game-data:/app/data
    environment:
      - PORT=3000
    restart: unless-stopped
    profiles:
      - prod

volumes:
  game-data:
