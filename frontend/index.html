<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Deathmatch Arena</title>

  <meta name="description" content="Deathmatch Arena — multiplayer top-down shooter. Enter the arena instantly!" />
  <meta name="theme-color" content="#1a1a2e" />
  <meta name="color-scheme" content="dark" />

  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚔</text></svg>" />

  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <!-- Start Screen: username + play button (centered overlay) -->
  <div id="startScreen">
    <div id="startBox">
      <h1>⚔ DEATHMATCH ARENA ⚔</h1>
      <p class="start-subtitle">Enter the arena. Kill everyone.</p>
      <input id="username" placeholder="Your name..." maxlength="16" autocomplete="off" spellcheck="false" />
      <div id="usernameError"></div>
      <button id="playBtn" onclick="doJoin()">▶ PLAY</button>
      <div id="onlineCount">
        <span id="onlineNumber">0</span> online
      </div>
      <div id="startControls">
        <span><kbd>WASD</kbd> Move</span>
        <span><kbd>Mouse</kbd> Aim & Shoot</span>
        <span><kbd>Q</kbd> Switch Weapon</span>
        <span><kbd>R</kbd> Reload</span>
        <span><kbd>Tab</kbd> Scoreboard</span>
      </div>
      <div id="volumeControl">
        <span id="volumeIcon" onclick="toggleMute()" style="cursor:pointer;">🔊</span>
        <input type="range" id="volumeSlider" min="0" max="100" value="70"
          style="accent-color:#ff6b35;cursor:pointer;width:100px;">
        <span id="volumeLabel">70%</span>
      </div>
    </div>
  </div>

  <!-- Game Canvas (full-screen) -->
  <canvas id="game"></canvas>

  <!-- HUD (in-game overlay — minimal) -->
  <div id="gameUI" style="display:none;">
    <!-- Top-center game timer -->
    <div id="topTimer">
      <span id="timerDisplay">⏱ 5:00</span>
    </div>
    <!-- Top-left volume control -->
    <div id="inGameVolume">
      <span id="hudVolumeIcon" onclick="toggleMute();syncVolumeControls();">🔊</span>
      <input type="range" id="hudVolumeSlider" min="0" max="100" value="70">
    </div>
    <!-- Bottom-left game controls hint -->
    <div id="controlsHint">
      <div class="ctrl-row"><kbd>WASD</kbd> Move</div>
      <div class="ctrl-row"><kbd>Mouse</kbd> Aim & Shoot</div>
      <div class="ctrl-row"><kbd>Q / 1-3</kbd> Weapon</div>
      <div class="ctrl-row"><kbd>R</kbd> Reload</div>
    </div>
  </div>

  <!-- Leaderboard (top-right overlay, always visible in-game) -->
  <div id="leaderboard" style="display:none;">
    <div id="leaderboardTitle">Leaderboard</div>
    <div id="leaderboardList"></div>
  </div>

  <!-- Scoreboard (TAB held) -->
  <div id="playerList" style="display:none;">
    <h3>⚔ Scoreboard ⚔</h3>
    <div id="playerListContent"></div>
    <div class="tab-hint">Hold TAB</div>
  </div>

  <!-- Kill Feed -->
  <div id="killFeed" style="display:none;"></div>

  <!-- Death overlay -->
  <div id="deathOverlay" style="display:none;">
    <div id="deathMessage">YOU DIED</div>
    <div id="deathKiller"></div>
    <div id="deathDroppedScore"></div>
    <button id="deathRespawnBtn" onclick="doRespawn()">⚔ RESPAWN</button>
  </div>

  <!-- Round End overlay -->
  <div id="roundEndOverlay" style="display:none;">
    <div id="roundEndTitle">ROUND OVER</div>
    <div id="roundEndWinner"></div>
    <div id="roundEndScoreboard"></div>
    <div id="roundEndCountdown">Next round in...</div>
  </div>

  <!-- Mobile Touch Controls -->
  <div id="mobileControls">
    <div class="touch-joystick-area" id="joystickArea">
      <div class="touch-joystick-base" id="joystickBase">
        <div class="touch-joystick-thumb" id="joystickThumb"></div>
      </div>
    </div>
    <div class="touch-right-side">
      <div class="touch-btn-row">
        <div class="touch-btn touch-btn-weapon" id="touchWeaponBtn">Q</div>
        <div class="touch-btn touch-btn-reload" id="touchReloadBtn">R</div>
      </div>
      <div class="touch-joystick-area touch-aim-area" id="aimJoystickArea">
        <div class="touch-joystick-base touch-aim-base" id="aimJoystickBase">
          <div class="touch-joystick-thumb touch-aim-thumb" id="aimJoystickThumb"></div>
        </div>
        <div class="touch-aim-label">🎯</div>
      </div>
    </div>
  </div>

  <script src="lib/msgpack.min.js"></script>
  <script src="game.js"></script>

</body>

</html>
